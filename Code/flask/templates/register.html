{% extends "base.html" %}

{% block title %}Register - Expense Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass auth-card fade-in">
        <h2>Start Tracking</h2>
        <form method="POST">
            <div class="form-group">
                <label for="username">Create Username</label>
                <input type="text" name="username" id="username" class="form-input" required
                    placeholder="Pick a username">
            </div>
            <div class="form-group">
                <label for="password">Choose Password</label>
                <input type="password" name="password" id="password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
            Already registered? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
