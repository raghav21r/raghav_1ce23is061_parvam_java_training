{% extends "base.html" %}

{% block title %}Edit Expense - Expense Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass auth-card fade-in" style="max-width: 500px;">
        <h2>Edit Expense</h2>
        <form method="POST">
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" step="0.01" name="amount" id="amount" class="form-input" required
                    value="{{ expense.amount }}">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category" class="form-input" required>
                    {% for cat in ['Food', 'Transport', 'Rent', 'Utilities', 'Entertainment', 'Shopping', 'Health',
                    'Other'] %}
                    <option value="{{ cat }}" {% if expense.category==cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" name="date" id="date" class="form-input" required
                    value="{{ expense.date.strftime('%Y-%m-%d') }}">
            </div>
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <input type="text" name="description" id="description" class="form-input"
                    value="{{ expense.description or '' }}">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Update Expense</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline"
                style="width: 100%; margin-top: 1rem;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
