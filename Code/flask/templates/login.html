{% extends "base.html" %}

{% block title %}Login - Expense Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass auth-card fade-in">
        <h2>Welcome Back</h2>
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-input" required
                    placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
