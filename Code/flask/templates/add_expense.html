{% extends "base.html" %}

{% block title %}Add Expense - Expense Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass auth-card fade-in" style="max-width: 500px;">
        <h2>Add Expense</h2>
        <form method="POST">
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" step="0.01" name="amount" id="amount" class="form-input" required
                    placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category" class="form-input" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Rent">Rent</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" name="date" id="date" class="form-input" required value="{{ today }}">
            </div>
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <input type="text" name="description" id="description" class="form-input"
                    placeholder="What was this for?">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Expense</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline"
                style="width: 100%; margin-top: 1rem;">Cancel</a>
        </form>
    </div>
</div>

<script>
    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
